services:
  postgres:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  app:
    command: pnpm dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'kill -0 $(cat /app/.next/server.pid 2>/dev/null) 2>/dev/null || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mailforge

  worker:
    command: pnpm worker:dev
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - mailforge

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - mailforge

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3001:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - mailforge