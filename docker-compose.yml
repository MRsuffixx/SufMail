services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mailforge

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mailforge
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}

  app:
    build:
      context: .
      target: runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./config.ts:/app/config.ts:ro
      - ./uploads:/app/uploads
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - mailforge
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'kill -0 $(cat /app/server.pid) 2>/dev/null || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mailforge
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'kill -0 $(cat /app/server.pid 2>/dev/null) 2>/dev/null || exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - mailforge

networks:
  mailforge:
    driver: bridge

volumes:
  postgres_data:
  redis_data: